<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProРаб — управление строительством</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#080808;
    color:white;
}

header{
    position:fixed;
    top:0;
    width:100%;
    height:80px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 8%;
    background:rgba(8,8,8,.85);
    backdrop-filter:blur(12px);
    border-bottom:1px solid #222;
    z-index:10;
}


.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:24px;
    font-weight:700;
}


.logo-icon{
    width:38px;
    height:38px;
    border-radius:10px;
    background:#ff8500;
    display:flex;
    align-items:center;
    justify-content:center;
    color:black;
    font-weight:900;
}


nav{
    display:flex;
    gap:35px;
    color:#bbb;
}

nav a{
    color:#bbb;
    text-decoration:none;
}

nav a:hover{
    color:white;
}


.btn{
    background:#ff8500;
    color:white;
    padding:14px 25px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}


.hero{
    min-height:100vh;
    padding:180px 8% 80px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}


.hero-text{
    max-width:650px;
}


h1{
    font-size:72px;
    line-height:1.05;
    margin:0 0 25px;
}


.orange{
    color:#ff8500;
}


p{
    color:#aaa;
    font-size:22px;
    line-height:1.5;
}


.mockup{
    width:450px;
    height:330px;
    background:#151515;
    border:1px solid #333;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 60px rgba(255,130,0,.15);
}


.card{
    background:#202020;
    padding:18px;
    border-radius:12px;
    margin-bottom:15px;
}


.card span{
    color:#ff8500;
    font-size:24px;
}


</style>

</head>


<body>


<header>

<div class="logo">
<div class="logo-icon">P</div>
ProРаб
</div>


<nav>
<a href="#">Возможности</a>
<a href="#">Решения</a>
<a href="#">Тарифы</a>
<a href="#">Документы</a>
</nav>


<a class="btn" href="#">
Начать бесплатно
</a>


</header>



<section class="hero">


<div class="hero-text">

<h1>
Управляйте стройкой
<br>
на <span class="orange">30%</span> эффективнее
</h1>


<p>
Единая SaaS-платформа для строительных компаний:
сметы, CRM, материалы и контроль объектов.
</p>


<br>

<a class="btn">
Создать проект
</a>


</div>



<div class="mockup">

<div class="card">
Объекты
<br>
<span>12</span>
</div>


<div class="card">
Бюджет проектов
<br>
<span>24 млн ₽</span>
</div>


<div class="card">
Выполнение
<br>
<span>68%</span>
</div>


</div>


</section>


</body>
</html>
