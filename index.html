<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProРаб — управление строительством</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter,Arial,sans-serif;
background:#080808;
color:white;
}


header{
height:80px;
border-bottom:1px solid #222;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 8%;
}


.logo{
display:flex;
align-items:center;
gap:12px;
font-size:24px;
font-weight:700;
}


.logo-icon{
width:42px;
height:42px;
border-radius:12px;
background:#ff8a00;
display:flex;
align-items:center;
justify-content:center;
color:#111;
font-size:24px;
font-weight:900;
}


nav{
display:flex;
gap:45px;
color:#aaa;
}


nav a{
text-decoration:none;
color:#aaa;
}


.btn{
background:#ff8a00;
color:white;
padding:15px 28px;
border-radius:12px;
font-weight:600;
border:none;
}


.hero{
min-height:760px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 8%;
}


.left{
max-width:620px;
}


h1{
font-size:76px;
line-height:1.05;
margin:0;
}


.orange{
color:#ff8a00;
}


.subtitle{
margin-top:30px;
font-size:22px;
line-height:1.5;
color:#aaa;
}


.buttons{
margin-top:40px;
display:flex;
gap:20px;
}


.secondary{
border:1px solid #444;
padding:15px 28px;
border-radius:12px;
color:white;
}


.panel{
width:420px;
background:#111;
border:1px solid #333;
border-radius:28px;
padding:30px;
box-shadow:0 0 80px rgba(255,138,0,.12);
}


.card{
background:#1b1b1b;
padding:25px;
border-radius:18px;
margin-bottom:18px;
}


.card span{
color:#777;
display:block;
}


.value{
font-size:32px;
color:#ff8a00;
font-weight:700;
margin-top:10px;
}


</style>

</head>


<body>


<header>


<div class="logo">

<div class="logo-icon">
⌁
</div>

ProРаб

</div>


<nav>

<a>Продукты</a>
<a>Возможности</a>
<a>Для компаний</a>
<a>Цены</a>
<a>Документы</a>

</nav>


<div>
<button class="btn">
Начать бесплатно
</button>
</div>


</header>



<section class="hero">


<div class="left">

<h1>

Управляйте стройкой
<br>

<span class="orange">
без хаоса
</span>

</h1>


<p class="subtitle">

ProРаб — единая SaaS-платформа
для строительных компаний:
сметы, CRM, материалы и контроль объектов.

</p>


<div class="buttons">

<button class="btn">
Создать проект
</button>

<div class="secondary">
Смотреть демо
</div>

</div>


</div>




<div class="panel">


<div class="card">

<span>
Активные объекты
</span>

<div class="value">
12
</div>

</div>


<div class="card">

<span>
Бюджет проектов
</span>

<div class="value">
24 млн ₽
</div>

</div>


<div class="card">

<span>
Выполнено работ
</span>

<div class="value">
68%
</div>

</div>


</div>



</section>


</body>
</html>
