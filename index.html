<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProРаб — управление строительством</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Inter,Arial,sans-serif;
}

body{
    background:#050505;
    color:white;
}


/* HEADER */

header{
    height:78px;
    border-bottom:1px solid #222;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 8%;
}


.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:24px;
    font-weight:700;
}


.logo-icon{
    width:42px;
    height:42px;
    background:#ff9500;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 25px #ff950055;
}


.logo-icon svg{
    width:25px;
    height:25px;
    fill:none;
    stroke:#111;
    stroke-width:2.5;
}


nav{
    display:flex;
    gap:45px;
}


nav a{
    color:#aaa;
    text-decoration:none;
    font-size:15px;
}


nav a:hover{
    color:white;
}



.btn{
    background:#ff9500;
    color:white;
    border:none;
    padding:14px 28px;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
}


/* HERO */


.hero{
    min-height:720px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 8%;
}


.left{
    width:50%;
}


h1{
    font-size:72px;
    line-height:1.05;
    letter-spacing:-2px;
}


.orange{
    color:#ff9500;
}


.subtitle{
    margin-top:30px;
    color:#999;
    font-size:20px;
    line-height:1.5;
    max-width:600px;
}


.buttons{
    margin-top:40px;
    display:flex;
    gap:18px;
}


.secondary{
    background:none;
    border:1px solid #444;
}



/* DASHBOARD CARD */


.dashboard{

    width:380px;
    padding:25px;

    background:#111;
    border:1px solid #292929;
    border-radius:24px;

    box-shadow:
    0 0 80px #ff950015;

}



.card-title{
    color:#888;
    margin-bottom:20px;
}


.stat{

    background:#191919;
    padding:22px;
    border-radius:16px;
    margin-bottom:15px;

}



.stat span{
    color:#777;
    font-size:14px;
}


.stat strong{
    display:block;
    margin-top:8px;
    font-size:28px;
    color:#ff9500;
}



</style>

</head>


<body>


<header>


<div class="logo">

<div class="logo-icon">

<svg viewBox="0 0 24 24">
<path d="M4 20V9l8-5 8 5v11"/>
<path d="M9 20v-6h6v6"/>
<path d="M7 10h10"/>
</svg>

</div>

ProРаб

</div>



<nav>

<a href="#">Продукты</a>
<a href="#">Возможности</a>
<a href="#">Для компаний</a>
<a href="#">Цены</a>
<a href="#">Документы</a>

</nav>



<button class="btn">
Начать бесплатно
</button>


</header>





<section class="hero">


<div class="left">


<h1>

Управляйте<br>
стройкой<br>

<span class="orange">
без хаоса
</span>

</h1>


<p class="subtitle">

ProРаб — единая SaaS-платформа
для строительных компаний:
сметы, CRM, материалы и контроль объектов.

</p>



<div class="buttons">

<button class="btn">
Создать проект
</button>


<button class="btn secondary">
Смотреть демо
</button>


</div>


</div>





<div class="dashboard">


<div class="card-title">
Панель управления
</div>



<div class="stat">

<span>
Активные объекты
</span>

<strong>
12
</strong>

</div>



<div class="stat">

<span>
Бюджет проектов
</span>

<strong>
24 млн ₽
</strong>

</div>



<div class="stat">

<span>
Выполнено работ
</span>

<strong>
68%
</strong>

</div>



</div>



</section>



</body>
</html>
